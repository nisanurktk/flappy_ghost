<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Ghost - GameDev</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }

  #gameContainer {
    position: relative;
    width: 400px;
    height: 600px;
    overflow: hidden;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 3px solid #8B4513;
    box-shadow: 0 0 30px rgba(180, 100, 20, 0.5), 0 0 60px rgba(180, 100, 20, 0.2);
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  #score {
    position: absolute;
    top: 18px;
    width: 100%;
    text-align: center;
    color: #fff;
    font-size: 22px;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
    letter-spacing: 2px;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    pointer-events: all;
  }

  #overlay.hidden { display: none; }

  #logoImg {
    width: 220px;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 10px rgba(200,120,20,0.7));
  }

  #overlayTitle {
    color: #fff;
    font-size: 13px;
    text-align: center;
    text-shadow: 2px 2px 0 #000;
    line-height: 2;
  }

  #overlayScore {
    color: #ffd700;
    font-size: 14px;
    text-shadow: 2px 2px 0 #000;
  }

  #startBtn {
    background: linear-gradient(180deg, #c8760a 0%, #8B4513 100%);
    border: 3px solid #e8a020;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 12px 24px;
    cursor: pointer;
    pointer-events: all;
    letter-spacing: 2px;
    box-shadow: 4px 4px 0 #3a1a00;
    transition: transform 0.1s, box-shadow 0.1s;
    image-rendering: pixelated;
  }

  #startBtn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 #3a1a00;
  }
  #startBtn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #3a1a00;
  }

  #hint {
    color: #aaa;
    font-size: 8px;
    text-align: center;
    line-height: 2.2;
  }

  #pixelGamedev {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }
</style>
</head>

</div>

// Game state
let gameRunning = false;
let score = 0;
let animFrame;

// Ghost
const ghost = {
  x: 80,
  y: 300,
  w: 52,
  h: 52,
  vy: 0,
  gravity: 0.45,
  jumpForce: -8.5,
  rotation: 0,
};

// Pipes
const PIPE_W = 52;
const GAP = 160;
const PIPE_SPEED = 2.8;
let pipes = [];
let frameCount = 0;

// Background stars
let stars = [];
for(let i=0;i<60;i++){
  stars.push({
    x: Math.random()*400,
    y: Math.random()*600,
    r: Math.random()*1.5+0.5,
    alpha: Math.random()*0.8+0.2,
    speed: Math.random()*0.5+0.2
  });
}

function spawnPipe() {
  const minTop = 60;
  const maxTop = canvas.height - GAP - 60;
  const topH = Math.floor(Math.random() * (maxTop - minTop) + minTop);
  pipes.push({
    x: canvas.width + 10,
    topH: topH,
    bottomY: topH + GAP,
    passed: false
  });
}

function jump() {
  if (!gameRunning) return;
  ghost.vy = ghost.jumpForce;
}

function startGame() {
  gameRunning = true;
  score = 0;
  scoreEl.textContent = '0';
  ghost.y = 300;
  ghost.vy = 0;
  ghost.rotation = 0;
  pipes = [];
  frameCount = 0;
  overlay.classList.add('hidden');
  overlayScore.style.display = 'none';
  loop();
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  finalScoreEl.textContent = score;
  overlayTitle.textContent = score > 10 ? '🏆 SÜPER!' : 'GAME OVER';
  overlayScore.style.display = 'block';
  startBtn.textContent = 'TEKRAR OYNA';
  overlay.classList.remove('hidden');
}

function drawBg() {
  // Deep red background #530F0E
  ctx.fillStyle = '#530F0E';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Stars twinkle
  stars.forEach(s => {
    s.x -= s.speed;
    if(s.x < 0) { s.x = canvas.width; s.y = Math.random()*canvas.height; }
    ctx.save();
    ctx.globalAlpha = s.alpha * (0.5 + 0.5*Math.sin(Date.now()/700 + s.x));
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawPixelPipe(x, y, w, h, capAtBottom) {
  const BASE = '#37383D';
  const LIGHT = '#52545A';
  const DARK = '#222326';
  const EDGE = '#111213';

  // Body
  ctx.fillStyle = BASE;
  ctx.fillRect(x, y, w, h);

  // Left highlight strip
  ctx.fillStyle = LIGHT;
  ctx.fillRect(x, y, 4, h);

  // Right dark strip
  ctx.fillStyle = DARK;
  ctx.fillRect(x + w - 4, y, 4, h);

  // Pixel row lines for texture
  ctx.fillStyle = EDGE;
  for(let row = y; row < y + h; row += 8) {
    ctx.fillRect(x, row, w, 1);
  }

  // Outer border
  ctx.strokeStyle = EDGE;
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
}

function drawPipe(pipe) {
  const topH = pipe.topH;
  const botY = pipe.bottomY;
  const botH = canvas.height - botY;
  const CAP_H = 18;
  const CAP_W = PIPE_W + 10;
  const CAP_X = pipe.x - 5;

  const BASE = '#37383D';
  const LIGHT = '#52545A';
  const DARK = '#22232600';
  const EDGE = '#111213';

  // Top pipe body
  drawPixelPipe(pipe.x, 0, PIPE_W, topH - CAP_H, false);
  // Top pipe cap (wider, at bottom of top pipe)
  ctx.fillStyle = '#42434A';
  ctx.fillRect(CAP_X, topH - CAP_H, CAP_W, CAP_H);
  ctx.fillStyle = LIGHT;
  ctx.fillRect(CAP_X, topH - CAP_H, CAP_W, 3);
  ctx.fillStyle = EDGE;
  ctx.fillRect(CAP_X, topH - 2, CAP_W, 2);
  ctx.strokeStyle = EDGE;
  ctx.lineWidth = 1;
  ctx.strokeRect(CAP_X, topH - CAP_H, CAP_W, CAP_H);

  // Bottom pipe body
  drawPixelPipe(pipe.x, botY + CAP_H, PIPE_W, botH - CAP_H, false);
  // Bottom pipe cap (wider, at top of bottom pipe)
  ctx.fillStyle = '#42434A';
  ctx.fillRect(CAP_X, botY, CAP_W, CAP_H);
  ctx.fillStyle = LIGHT;
  ctx.fillRect(CAP_X, botY, CAP_W, 3);
  ctx.fillStyle = EDGE;
  ctx.fillRect(CAP_X, botY + CAP_H - 2, CAP_W, 2);
  ctx.strokeStyle = EDGE;
  ctx.lineWidth = 1;
  ctx.strokeRect(CAP_X, botY, CAP_W, CAP_H);
}

function drawGhost() {
  ctx.save();
  ctx.translate(ghost.x + ghost.w/2, ghost.y + ghost.h/2);
  const targetRot = Math.max(-0.4, Math.min(0.5, ghost.vy * 0.06));
  ghost.rotation += (targetRot - ghost.rotation) * 0.15;
  ctx.rotate(ghost.rotation);
  // Glow effect
  ctx.shadowColor = 'rgba(255,255,255,0.4)';
  ctx.shadowBlur = 14;
  if(ghostImg.complete && ghostImg.naturalWidth > 0) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(ghostImg, -ghost.w/2, -ghost.h/2, ghost.w, ghost.h);
  } else {
    ctx.fillStyle = 'rgba(220,220,255,0.9)';
    ctx.fillRect(-ghost.w/2, -ghost.h/2, ghost.w, ghost.h);
  }
  ctx.restore();
}

function checkCollision(pipe) {
  const gx = ghost.x + 6;
  const gy = ghost.y + 6;
  const gw = ghost.w - 12;
  const gh = ghost.h - 12;

  // Top pipe
  if(gx < pipe.x + PIPE_W && gx + gw > pipe.x) {
    if(gy < pipe.topH - 16 || gy + gh > pipe.bottomY + 16) {
      return true;
    }
  }
  return false;
}

function loop() {
  if(!gameRunning) return;
  frameCount++;

  drawBg();

  // Pipes
  if(frameCount % 90 === 0) spawnPipe();
  pipes = pipes.filter(p => p.x + PIPE_W + 10 > 0);
  pipes.forEach(pipe => {
    pipe.x -= PIPE_SPEED;
    drawPipe(pipe);

    if(!pipe.passed && pipe.x + PIPE_W < ghost.x) {
      pipe.passed = true;
      score++;
      scoreEl.textContent = score;
    }

    if(checkCollision(pipe)) endGame();
  });

  // Ghost physics
  ghost.vy += ghost.gravity;
  ghost.y += ghost.vy;

  // Floor/ceiling
  if(ghost.y + ghost.h > canvas.height || ghost.y < 0) {
    endGame();
    return;
  }

  drawGhost();

  // Score on canvas
  ctx.save();
  ctx.font = '16px "Press Start 2P"';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 6;
  ctx.fillText(score, canvas.width/2, 36);
  ctx.restore();

  animFrame = requestAnimationFrame(loop);
}

// Controls
document.addEventListener('keydown', e => {
  if(e.code === 'Space') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });
startBtn.addEventListener('click', startGame);

// Draw static screen before start
(function drawStatic() {
  drawBg();
})();
</script>
</body>
</html>
